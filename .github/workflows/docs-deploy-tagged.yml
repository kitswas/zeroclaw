name: Deploy mdBook docs for tagged release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  deploy_tag:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - name: Install mdBook (linux)
        run: |
          MDBOOK_BIN_VERSION=v0.5.0
          curl -sSL "https://github.com/rust-lang/mdBook/releases/download/${MDBOOK_BIN_VERSION}/mdbook-${MDBOOK_BIN_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xz -C /usr/local/bin

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust build cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: docs-deploy
          cache-all-crates: true

      - name: Update package lists
        run: sudo apt-get update

      - name: Install gettext tools
        run: sudo apt-get install -y --no-install-recommends gettext

      - name: Install rsync
        run: sudo apt-get install -y --no-install-recommends rsync

      - name: Validate .po format
        run: |
          ok=0
          for po in docs/book/po/*.po; do
            [ -f "$po" ] || continue
            msgfmt --check-format "$po" -o /dev/null || ok=1
          done
          exit $ok

      - name: Build docs for tag
        env:
          TAG: ${{ github.ref_name }}
        run: |
          echo "Building docs for TAG=$TAG"
          cargo mdbook build

      - name: Merge tag build into gh-pages
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          REPO="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          CLONE_DIR=$(mktemp -d)
          echo "Cloning gh-pages into ${CLONE_DIR}"
          if git ls-remote --exit-code origin gh-pages >/dev/null 2>&1; then
            git clone --depth 1 --branch gh-pages "$REPO" "$CLONE_DIR"
          else
            git clone --depth 1 "$REPO" "$CLONE_DIR" || true
            cd "$CLONE_DIR"
            git checkout --orphan gh-pages || git switch --orphan gh-pages || true
            cd - >/dev/null
          fi

          # Copy built tag docs into gh-pages under '<tag>/'
          mkdir -p "$CLONE_DIR/$TAG"
          rsync -a --delete "docs/book/book/$TAG/" "$CLONE_DIR/$TAG/"

          # If this is a stable release (no pre-release suffix), also copy to /stable/
          if [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            mkdir -p "$CLONE_DIR/stable"
            rsync -a --delete "$CLONE_DIR/$TAG/" "$CLONE_DIR/stable/"
          fi

          # Regenerate versions.json by scanning all version directories
          pushd "$CLONE_DIR" >/dev/null
          python3 "${GITHUB_WORKSPACE}/.github/scripts/generate-versions.py" > versions.json

          # Ensure root redirect points to /stable/en/ if stable docs exist
          if [ -d "stable" ]; then
            bash "${GITHUB_WORKSPACE}/.github/scripts/gen-index-stable.sh"
          fi

          git add --all
          git -c user.name="$GIT_AUTHOR_NAME" -c user.email="$GIT_AUTHOR_EMAIL" commit -m "docs: add docs for $TAG (from $GITHUB_SHA)" || true
          git push "$REPO" gh-pages
          popd >/dev/null
